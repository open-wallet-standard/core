name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump version in source files
        run: |
          V="${GITHUB_REF_NAME#v}"
          # Python bindings
          sed -i "s/^version = \".*\"/version = \"$V\"/" bindings/python/pyproject.toml bindings/python/Cargo.toml
          # Node bindings
          sed -i "s/^version = \".*\"/version = \"$V\"/" bindings/node/Cargo.toml
          cd bindings/node
          npm version "$V" --no-git-tag-version
          for pkg in npm/*/package.json; do
            jq --arg v "$V" '.version = $v' "$pkg" > tmp.json && mv tmp.json "$pkg"
          done
          jq --arg v "$V" '.optionalDependencies |= with_entries(.value = $v)' package.json > tmp.json && mv tmp.json package.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "chore: bump version to ${GITHUB_REF_NAME#v}"
          git push

  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: lws-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: lws-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: lws-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: lws-darwin-aarch64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: lws

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/lws ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: lws/${{ matrix.asset }}

  python-wheels:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13

      - name: Set version from tag
        run: |
          V="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \".*\"/version = \"$V\"/" bindings/python/pyproject.toml bindings/python/Cargo.toml
          rm -f bindings/python/pyproject.toml.bak bindings/python/Cargo.toml.bak

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.9 python3.10 python3.11 python3.12 python3.13
          sccache: "true"
          manylinux: auto
          working-directory: bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.target }}
          path: bindings/python/dist/*.whl

  publish-pypi:
    needs: python-wheels
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Purge shields.io cache
        if: success()
        run: curl -sX POST https://purge.shields.io/pypi/v/local-wallet-standard

  node-addons:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: bindings/node

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Set version from tag
        run: |
          V="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \".*\"/version = \"$V\"/" Cargo.toml
          rm -f Cargo.toml.bak
          npm version "$V" --no-git-tag-version --allow-same-version
          for pkg in npm/*/package.json; do
            python3 -c "
          import json
          with open('$pkg') as f: d = json.load(f)
          d['version'] = '$V'
          with open('$pkg', 'w') as f: json.dump(d, f, indent=2)
          "
          done

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-addon-${{ matrix.target }}
          path: |
            bindings/node/*.node
            bindings/node/index.js
            bindings/node/index.d.ts

  publish-npm:
    needs: [node-addons, build]
    runs-on: ubuntu-latest
    environment: release

    defaults:
      run:
        working-directory: bindings/node

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          V="${GITHUB_REF_NAME#v}"
          npm version "$V" --no-git-tag-version --allow-same-version
          for pkg in npm/*/package.json; do
            python3 -c "
          import json
          with open('$pkg') as f: d = json.load(f)
          d['version'] = '$V'
          with open('$pkg', 'w') as f: json.dump(d, f, indent=2)
          "
          done
          jq --arg v "$V" '.optionalDependencies |= with_entries(.value = $v)' package.json > tmp.json && mv tmp.json package.json

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-addon-*
          merge-multiple: true
          path: bindings/node/artifacts

      - name: Move artifacts to platform packages
        run: |
          npx napi artifacts --dir artifacts
          cp artifacts/index.js . 2>/dev/null || true
          cp artifacts/index.d.ts . 2>/dev/null || true

      - name: Verify index.js exists
        run: |
          if [ ! -f index.js ] || [ ! -f index.d.ts ]; then
            echo "ERROR: index.js or index.d.ts missing — npm package would be broken"
            exit 1
          fi

      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          pattern: lws-*
          merge-multiple: true
          path: bindings/node/cli-binaries

      - name: Copy CLI binaries into platform packages
        run: |
          cp cli-binaries/lws-darwin-aarch64 npm/darwin-arm64/lws   && chmod +x npm/darwin-arm64/lws
          cp cli-binaries/lws-darwin-x86_64  npm/darwin-x64/lws     && chmod +x npm/darwin-x64/lws
          cp cli-binaries/lws-linux-x86_64   npm/linux-x64-gnu/lws  && chmod +x npm/linux-x64-gnu/lws
          cp cli-binaries/lws-linux-aarch64  npm/linux-arm64-gnu/lws && chmod +x npm/linux-arm64-gnu/lws

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            if [ -d "$dir" ]; then
              npm publish "$dir" --access public || true
            fi
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --ignore-scripts

      - name: Purge shields.io cache
        if: success()
        run: curl -sX POST https://purge.shields.io/npm/v/@local-wallet-standard/node

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: lws-*
